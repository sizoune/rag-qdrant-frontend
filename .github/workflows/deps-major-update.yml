name: Weekly Major Dependency Update

on:
  schedule:
    - cron: "30 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-major:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect major updates
        id: detect
        run: |
          OUTDATED=$(bun outdated 2>/dev/null || true)
          PACKAGES="[]"
          if [ -n "$OUTDATED" ]; then
            PACKAGES=$(echo "$OUTDATED" | node -e "
              const lines = require('fs').readFileSync('/dev/stdin', 'utf8').split('\n');
              const packages = [];
              for (const line of lines) {
                const match = line.match(/^(\S+)\s+(\d+)\.\d+\.\d+\S*\s+\S+\s+(\d+)\.\d+\.\d+/);
                if (match) {
                  const [, name, currentMajor, latestMajor] = match;
                  if (parseInt(latestMajor) > parseInt(currentMajor)) {
                    packages.push({ name, current: match[2], latest: latestMajor });
                  }
                }
              }
              console.log(JSON.stringify(packages));
            " 2>/dev/null || echo "[]")
          fi
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

  update-major:
    needs: check-major
    if: needs.check-major.outputs.packages != '[]' && needs.check-major.outputs.packages != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.check-major.outputs.packages) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check if PR already exists
        id: existing
        env:
          PKG_NAME: ${{ matrix.package.name }}
        uses: actions/github-script@v7
        with:
          script: |
            const pkg = process.env.PKG_NAME;
            const safePkg = pkg.replace(/[@/]/g, '-').replace(/^-/, '');
            const branchPrefix = `chore/major-update-${safePkg}`;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            const exists = prs.some(pr => pr.head.ref.startsWith(branchPrefix));
            core.setOutput('exists', exists.toString());

      - name: Update package to latest major
        if: steps.existing.outputs.exists == 'false'
        env:
          PKG_NAME: ${{ matrix.package.name }}
        run: bun add "$PKG_NAME@latest"

      - name: Auto-fix lint issues
        if: steps.existing.outputs.exists == 'false'
        run: bunx eslint --fix .

      - name: Run lint
        if: steps.existing.outputs.exists == 'false'
        run: bun run lint

      - name: Build
        if: steps.existing.outputs.exists == 'false'
        run: bun run build

      - name: Run tests
        if: steps.existing.outputs.exists == 'false'
        run: bunx vitest run

      - name: Create pull request
        if: steps.existing.outputs.exists == 'false'
        env:
          PKG_NAME: ${{ matrix.package.name }}
          PKG_CURRENT: ${{ matrix.package.current }}
          PKG_LATEST: ${{ matrix.package.latest }}
        uses: actions/github-script@v7
        with:
          script: |
            const pkg = process.env.PKG_NAME;
            const current = process.env.PKG_CURRENT;
            const latest = process.env.PKG_LATEST;
            const safePkg = pkg.replace(/[@/]/g, '-').replace(/^-/, '');
            const branch = `chore/major-update-${safePkg}-v${latest}`;
            const { execSync } = require('child_process');

            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync(`git checkout -b ${branch}`);
            execSync('git add -A');
            execSync(`git commit -m "chore(deps): update ${pkg} to v${latest} (major)"`);
            execSync(`git push origin ${branch}`);

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore(deps): update ${pkg} v${current} → v${latest} (major)`,
              head: branch,
              base: 'main',
              body: [
                `## Major Dependency Update: \\`${pkg}\\``,
                '',
                '| | Version |',
                '|---|---------|',
                `| **Current** | v${current}.x |`,
                `| **New** | v${latest}.x |`,
                '',
                '### Checks passed',
                '- [x] Lint',
                '- [x] Build',
                '- [x] Test',
                '',
                '> **Note:** Major version bump. Review changelog for breaking changes.',
                '',
                '> Generated automatically by deps-major-update workflow',
              ].join('\n'),
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: ['sizoune'],
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['dependencies', 'major'],
            });

            console.log(`Created PR #${pr.number} for ${pkg}: ${pr.html_url}`);
