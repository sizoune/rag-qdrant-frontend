name: Weekly Dependency Update (Minor/Patch)

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Capture current lockfile
        run: cp bun.lock /tmp/bun.lock.before

      - name: Update minor/patch dependencies
        run: bun update

      - name: Check for changes
        id: changes
        run: |
          if diff -q bun.lock /tmp/bun.lock.before > /dev/null 2>&1; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-fix lint issues
        if: steps.changes.outputs.has_changes == 'true'
        run: bunx eslint --fix .

      - name: Run lint check
        if: steps.changes.outputs.has_changes == 'true'
        id: lint
        run: |
          if bun run lint 2>&1 | tee /tmp/lint-output.txt; then
            echo "lint_pass=true" >> "$GITHUB_OUTPUT"
          else
            echo "lint_pass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on lint failure
        if: steps.changes.outputs.has_changes == 'true' && steps.lint.outputs.lint_pass == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lintOutput = fs.readFileSync('/tmp/lint-output.txt', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore(deps): lint errors after dependency update ${date}`,
              body: [
                '## Dependency update failed lint check',
                '',
                'Auto-fix was applied but unfixable lint errors remain.',
                '',
                '### Lint output',
                '```',
                lintOutput.slice(0, 60000),
                '```',
                '',
                'Please fix manually and run `bun update` again.',
              ].join('
'),
              labels: ['dependencies', 'bug'],
              assignees: ['sizoune'],
            });

      - name: Fail on lint errors
        if: steps.changes.outputs.has_changes == 'true' && steps.lint.outputs.lint_pass == 'false'
        run: exit 1

      - name: Build
        if: steps.changes.outputs.has_changes == 'true' && steps.lint.outputs.lint_pass != 'false'
        run: bun run build

      - name: Run tests
        if: steps.changes.outputs.has_changes == 'true' && steps.lint.outputs.lint_pass != 'false'
        run: bunx vitest run

      - name: Generate update summary
        if: steps.changes.outputs.has_changes == 'true' && steps.lint.outputs.lint_pass != 'false'
        id: summary
        run: |
          SUMMARY=$(diff /tmp/bun.lock.before bun.lock | head -200 || true)
          {
            echo "diff<<DIFF_EOF"
            echo "$SUMMARY"
            echo "DIFF_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Close existing dependency update PRs
        if: steps.changes.outputs.has_changes == 'true' && steps.lint.outputs.lint_pass != 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: allOpen } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            for (const pr of allOpen) {
              if (pr.head.ref.startsWith('chore/deps-update-')) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: 'closed',
                });
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${pr.head.ref}`,
                }).catch(() => {});
                console.log(`Closed PR #${pr.number}: ${pr.title}`);
              }
            }

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true' && steps.lint.outputs.lint_pass != 'false'
        env:
          DIFF_SUMMARY: ${{ steps.summary.outputs.diff }}
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const branch = `chore/deps-update-${date}`;
            const { execSync } = require('child_process');

            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync(`git checkout -b ${branch}`);
            execSync('git add -A');
            execSync(`git commit -m "chore(deps): weekly minor/patch update ${date}"`);
            execSync(`git push origin ${branch}`);

            const diffSummary = process.env.DIFF_SUMMARY || 'No diff available';

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore(deps): weekly minor/patch update ${date}`,
              head: branch,
              base: 'main',
              body: [
                '## Weekly Dependency Update',
                '',
                `**Date:** ${date}`,
                '**Scope:** Minor and patch versions only',
                '',
                '### Checks passed',
                '- [x] Lint',
                '- [x] Build',
                '- [x] Test',
                '',
                '### Lockfile diff (first 200 lines)',
                '```diff',
                diffSummary,
                '```',
                '',
                '> Generated automatically by deps-update workflow',
              ].join('
'),
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: ['sizoune'],
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['dependencies'],
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
