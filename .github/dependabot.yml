version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        versions: ["*-alpha*", "*-beta*", "*-rc*", "*-next*", "*-canary*", "*-dev*"]
